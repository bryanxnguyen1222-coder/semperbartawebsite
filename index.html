<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semper Barta Consultancy</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #000;
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .nav-inner {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      font-size: 18px;
    }

    .logo-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(212,175,55,0.6);
      color: #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 26px;
      background: rgba(212,175,55,0.08);
    }

    .nav-links {
      display: flex;
      gap: 36px;
      font-size: 17px;
    }

    .nav-links a:hover {
      color: #d4af37;
    }

    .hero {
      min-height: 100vh;
      background:
        radial-gradient(circle at 62% 88%, rgba(212,175,55,0.18), transparent 18%),
        radial-gradient(circle at 56% 94%, rgba(212,175,55,0.10), transparent 26%),
        linear-gradient(180deg, #000 0%, #020202 100%);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.35), rgba(0,0,0,0.05));
      pointer-events: none;
    }

    .hero-inner {
      max-width: 1400px;
      margin: 0 auto;
      min-height: calc(100vh - 85px);
      padding: 40px 28px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: end;
      gap: 20px;
      position: relative;
      z-index: 2;
    }

    .hero-left {
      display: flex;
      align-items: end;
      justify-content: flex-start;
    }

    .hero-left img {
      max-height: 900px;
      width: auto;
      object-fit: contain;
    }

    .hero-right {
      position: relative;
      padding-bottom: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero-icons {
      display: flex;
      gap: 26px;
      margin-bottom: 26px;
      color: #d4af37;
      font-size: 58px;
      line-height: 1;
    }

    .hero-icons span {
      display: inline-block;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(56px, 7vw, 106px);
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    .gold {
      color: #d4af37;
    }

    .hero-sub {
      max-width: 700px;
      font-size: clamp(20px, 2vw, 30px);
      line-height: 1.55;
      color: #d8d8d8;
      margin-bottom: 34px;
    }

    .hero-btn {
      display: inline-block;
      background: #d4af37;
      color: #000;
      font-weight: 700;
      font-size: 24px;
      padding: 24px 52px;
      border-radius: 16px;
      transition: 0.2s ease;
      box-shadow: 0 0 0 rgba(212,175,55,0.0);
    }

    .hero-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(212,175,55,0.28);
    }

    .devices {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 520px;
      max-width: 95%;
    }

    .devices img {
      width: 100%;
      height: auto;
    }

    @media (max-width: 1100px) {
      .hero-inner {
        grid-template-columns: 1fr;
        align-items: center;
        padding-top: 40px;
      }

      .hero-left {
        justify-content: center;
      }

      .hero-left img {
        max-height: 520px;
      }

      .hero-right {
        padding-bottom: 60px;
      }

      .devices {
        position: relative;
        margin: 40px auto 0;
        right: auto;
        bottom: auto;
      }
    }

    @media (max-width: 768px) {
      .nav-links {
        gap: 18px;
        font-size: 15px;
      }

      .logo {
        font-size: 16px;
      }

      .hero-icons {
        font-size: 40px;
        margin-bottom: 18px;
      }

      .hero-sub {
        font-size: 18px;
      }

      .hero-btn {
        font-size: 20px;
        padding: 18px 34px;
      }

      .hero-left img {
        max-height: 420px;
      }
    }

    @media (max-width: 520px) {
      .nav-inner {
        flex-direction: column;
        gap: 16px;
      }

      .hero h1 {
        font-size: 48px;
      }

      .hero-left img {
        max-height: 340px;
      }

      .hero-btn {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-inner">
      <div class="logo">
        <div class="logo-circle">S</div>
        <div>Semper Barta Consultancy</div>
      </div>

      <nav class="nav-links">
        <a href="#services">Services</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-left">
        <img src="matt 1.png" alt="Consultant portrait">
      </div>

      <div class="hero-right">
        <div class="hero-icons">
          <span>🛒</span>
          <span>◐</span>
        </div>

        <h1>
          Proven <span class="gold">eCommerce</span><br>
          Consulting
        </h1>

        <p class="hero-sub">
          Take your online business to the next level with expert strategies and insights for Ecommerce growth.
        </p>

        <a href="#contact" class="hero-btn">Book Consultation</a>

        <div class="devices">
          <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=1200&q=80" alt="Business dashboard">
        </div>
      </div>
    </div>
  </section>

  <section id="services" style="height: 400px;"></section>
  <section id="about" style="height: 400px;"></section>
  <section id="contact" style="height: 400px;"></section>

</body>
</html>
