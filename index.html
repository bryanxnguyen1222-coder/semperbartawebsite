<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semper Barta Consultancy</title>
  <meta name="description" content="Semper Barta Consultancy helps brands grow through eCommerce strategy, SEO, paid media, retention, analytics, and digital transformation." />
  <style>
    :root {
      --bg: #050505;
      --panel: #0b0b0b;
      --panel-light: #121212;
      --text: #f5f5f5;
      --muted: #d0d0d0;
      --gold: #d7b247;
      --gold-soft: #ead07b;
      --line: rgba(255,255,255,0.08);
      --max: 1280px;
      --radius: 26px;
      --shadow: 0 24px 60px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    .container {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
    }

    .gold { color: var(--gold); }
    .muted { color: #cfcfcf; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 0 38px;
      border-radius: 18px;
      font-size: 1.05rem;
      font-weight: 800;
      transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease, border-color 0.22s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.18);
    }

    .btn-primary {
      color: #121212;
      background: linear-gradient(135deg, #ecd98e, var(--gold));
    }

    .btn-secondary {
      color: #f4f4f4;
      background: transparent;
      border-color: rgba(255,255,255,0.14);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(14px);
      background: rgba(5,5,5,0.82);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .nav {
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(215,178,71,0.18), rgba(215,178,71,0.46));
      color: var(--gold-soft);
      border: 1px solid rgba(215,178,71,0.34);
    }

    .brand-mark svg { width: 22px; height: 22px; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      color: #ececec;
      font-size: 0.98rem;
    }

    .nav-links a:hover { color: var(--gold-soft); }
