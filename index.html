<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semper Barta Consultancy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    .nav-links a {
      margin-left: 20px;
      color: #ccc;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      padding: 80px 20px;
    }

    .hero-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: auto;
      gap: 60px;
    }

    .hero-image img {
      max-width: 450px;
      width: 100%;
    }

    .hero-text {
      max-width: 600px;
    }

    .eyebrow {
      color: #d4af37;
      letter-spacing: 2px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .hero-text h1 {
      font-size: 64px;
      line-height: 1.1;
      margin: 0;
    }

    .gold {
      color: #d4af37;
    }

    .subtext {
      color: #ccc;
      margin: 20px 0;
      font-size: 18px;
      line-height: 1.6;
    }

    .btn {
      background: #d4af37;
      color: black;
      padding: 14px 28px;
      border-radius: 8px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .hero-container {
        flex-direction: column;
        text-align: center;
      }

      .hero-text h1 {
        font-size: 42px;
      }

      .hero-image img {
        max-width: 300px;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="nav">
    <div class="logo">Semper Barta Consultancy</div>
    <div class="nav-links">
      <a href="#">Services</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-container">

      <!-- LEFT IMAGE -->
      <div class="hero-image">
        <img src="hero.png" alt="Consultant">
      </div>

      <!-- RIGHT TEXT -->
      <div class="hero-text">
        <p class="eyebrow">PROVEN GROWTH STRATEGY</p>

        <h1>
          Proven <span class="gold">eCommerce</span><br>
          Consulting
        </h1>

        <p class="subtext">
          Take your online business to the next level with expert strategy,
          retention planning, and growth systems built to increase revenue
          and long term performance.
        </p>

        <a href="#" class="btn">Book Consultation</a>
      </div>

    </div>
  </section>

</body>
</html>
